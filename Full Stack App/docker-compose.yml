services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - SECRET_KEY=change-this-to-a-long-random-string
      - CORS_ORIGINS=http://localhost:5173,http://localhost:4173
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend
